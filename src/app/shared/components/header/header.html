<header class="top-nav">
  <div class="nav-content">
    <div class="nav-left">
      <a routerLink="/" class="brand">CodeBlog Academy</a>
      <nav class="desktop-nav">
        <a routerLink="/courses" routerLinkActive="active">Learn</a>
        <a routerLink="/blog" routerLinkActive="active">Articles</a>
        <a routerLink="/roadmaps" routerLinkActive="active">Roadmaps</a>
        <a routerLink="/community" routerLinkActive="active">Community</a>
      </nav>
    </div>
    <div class="nav-right">
      <button class="material-symbols-outlined action-btn">search</button>
      
      @if (isLoggedIn) {
        <div class="user-menu">
          <button class="avatar-btn" (click)="toggleDropdown($event)">
            <img [src]="user.avatarUrl" alt="User Avatar" />
          </button>
          
          @if (isDropdownOpen) {
            <div class="dropdown-menu">
              <div class="dropdown-header">
                <p class="user-name">{{ user.name }}</p>
                <p class="user-role">{{ user.role }}</p>
              </div>
              <div class="dropdown-body">
                <a routerLink="/dashboard" class="dropdown-item">
                  <span class="material-symbols-outlined icon">dashboard</span>
                  Student Dashboard
                </a>
                <a routerLink="/teacher-dashboard" class="dropdown-item">
                  <span class="material-symbols-outlined icon">school</span>
                  Instructor Console
                </a>
                <a routerLink="/settings" class="dropdown-item">
                  <span class="material-symbols-outlined icon">settings</span>
                  Settings
                </a>
              </div>
              <div class="dropdown-footer">
                <button class="dropdown-item logout">
                  <span class="material-symbols-outlined icon">logout</span>
                  Sign Out
                </button>
              </div>
            </div>
          }
        </div>
      } @else {
        <button class="btn-primary" routerLink="/login">Sign In</button>
      }
    </div>
  </div>
</header>
